<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<div class="container-fluid">
  <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
    <h1 class="h2" style="color: #2d3436;"><i class="fas fa-money-bill-wave"></i> Payroll</h1>
  </div>

  <div class="table-container mb-4">
    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="month" class="form-label">Bulan</label>
        <select class="form-select" id="month">
          <option value="1">Januari</option>
          <option value="2">Februari</option>
          <option value="3">Maret</option>
          <option value="4">April</option>
          <option value="5">Mei</option>
          <option value="6">Juni</option>
          <option value="7">Juli</option>
          <option value="8">Agustus</option>
          <option value="9">September</option>
          <option value="10">Oktober</option>
          <option value="11">November</option>
          <option value="12">Desember</option>
        </select>
      </div>
      <div class="col-md-6 mb-3">
        <label for="year" class="form-label">Tahun</label>
        <input type="number" class="form-control" id="year" value="2026">
      </div>
    </div>
    <button class="btn btn-primary btn-custom" onclick="calculatePayroll()">Hitung Payroll</button>
  </div>

  <div class="table-container">
     <div class="d-flex justify-content-between mb-4">
       <h5><i class="fas fa-money-bill-wave"></i> Daftar Gaji</h5>
     </div>
     <div class="table-responsive">
       <table class="table table-hover">
         <thead class="table-light">
           <tr>
             <th>Nama</th>
             <th>Hadir</th>
             <th>Terlambat</th>
             <th>Pulang Cepat</th>
             <th>Gaji Bersih</th>
             <th>Aksi</th>
           </tr>
         </thead>
         <tbody id="payrollTable">
         </tbody>
       </table>
     </div>
  </div>
</div>

<script>
  function calculatePayroll() {
    var month = document.getElementById('month').value;
    var year = document.getElementById('year').value;

    google.script.run.withSuccessHandler(function(data) {
      var table = document.getElementById('payrollTable');
      table.innerHTML = '';
      data.forEach(function(pay) {
        var tr = table.insertRow();
        tr.insertCell(0).textContent = pay.nama;
        tr.insertCell(1).textContent = pay.hadir;
        tr.insertCell(2).textContent = pay.terlambat;
        tr.insertCell(3).textContent = pay.pulangCepat;
        tr.insertCell(4).textContent = 'Rp ' + pay.gajiBersih.toLocaleString();
        var actions = tr.insertCell(5);
        actions.innerHTML = '<button class="btn btn-sm btn-success" onclick="sendWASlip(\'' + pay.id + '\', ' + month + ', ' + year + ')">Kirim WA</button>';
      });
    }).calculatePayroll(month, year);
  }

  function sendWASlip(id, month, year) {
    google.script.run.withSuccessHandler(function(success) {
      if (success) {
        alert('Slip gaji dikirim via WA');
      } else {
        alert('Gagal mengirim');
      }
    }).sendWASlip(id, month, year);
  }
</script>
